    const { useState, useEffect, useRef, useMemo } = React;

    // ── Supabase 설정 (localStorage에서 로드) ────────────────
    const SB_URL_KEY  = 'shopee_sb_url';
    const SB_KEY_KEY  = 'shopee_sb_anon';

    function getSbUrl()  { return localStorage.getItem(SB_URL_KEY)  || ''; }
    function getSbAnon() { return localStorage.getItem(SB_KEY_KEY) || ''; }
    function saveSbConfig(url, anon) {
      localStorage.setItem(SB_URL_KEY,  url.trim());
      localStorage.setItem(SB_KEY_KEY, anon.trim());
    }
    function clearSbConfig() {
      localStorage.removeItem(SB_URL_KEY);
      localStorage.removeItem(SB_KEY_KEY);
    }
    function isConfigured() {
      const u = getSbUrl(), a = getSbAnon();
      return u.startsWith('https://') && u.includes('.supabase.co') && a.startsWith('eyJ');
    }

    // supabase 클라이언트 — 설정이 있을 때만 생성 (중복 인스턴스 방지)
    let _sbClient = isConfigured()
      ? window.supabase.createClient(getSbUrl(), getSbAnon(), {
          auth: { storageKey: 'shopee-sb-auth' }
        })
      : null;

    function reinitSupabase(url, anon) {
      _sbClient = window.supabase.createClient(url, anon, {
        auth: { storageKey: 'shopee-sb-auth' }
      });
    }

    function getEdgeFnUrl() {
      return getSbUrl() + '/functions/v1/ai-proxy';
    }

    // ── 익명 로그인 사용 ─────────────────────────────────────

async function googleTranslate(text, targetLang) {
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();
    return data[0]?.map(x => x[0]).join('') || text;
  } catch { return text; }
}

async function fileToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("읽기 실패"));
    r.readAsDataURL(file);
  });
}

// ── 메인 ──────────────────────────────────────────────────────
function App() {
  const [tab,     setTab]     = useState("form");
  const [rates,   setRates]   = useState(RATES0);
  const [items,   setItems]   = useState([]);
  const [uid,     setUid]     = useState(1);
  const [sheet,   setSheet]   = useState(null);
  const [toast,   setToast]   = useState("");
  // 번역 & 검색 상태
  const [xlLoad,    setXlLoad]    = useState(false);
  const [xlResult,  setXlResult]  = useState(null); // {en, localMap}
  const [searchOpen,setSearchOpen]= useState(false);

  // 시장가 직접 입력 상태
  const [marketPrices, setMarketPrices] = useState({}); // {MY: 150, SG: 45, ...}
  const [showMarket,   setShowMarket]   = useState(false);
  const [inspOpen,  setInspOpen]  = useState(true);

  // ── Supabase 설정 모달 상태 ──
  const [sbModal,   setSbModal]   = useState(false);
  const [sbUrlInp,  setSbUrlInp]  = useState('');
  const [sbAnonInp, setSbAnonInp] = useState('');
  const [sbConfigOk,setSbConfigOk]= useState(() => isConfigured());

  // ── Auth 상태 ──
  const [session,   setSession]   = useState(null);   // Supabase session
  const [authReady, setAuthReady] = useState(false);  // 초기 세션 로드 완료


  const [F, setF] = useState({
    name:"", desc:"", cat:"전자기기", country:"MY",
    costKRW:"", sellLocal:"", origLocal:"",
    stock:"100", weight:"",
    shopFee:3, payFee:2, shipLocal:"10", etcKRW:"0",
    setBuy:"1",   // 세트 구성: 매입 수량 (몇 개를 매입?)
    setSell:"1",  // 세트 구성: 판매 수량 (몇 개짜리 세트로 판매?)
  });
  const set = k => v => setF(f=>({...f,[k]:v}));

  useEffect(()=>{
    fetch("https://api.exchangerate-api.com/v4/latest/KRW")
      .then(r=>r.json()).then(d=>{
        const r={...RATES0};
        Object.keys(r).forEach(c=>{ if(d.rates[c]) r[c]=1/d.rates[c]; });

      }).catch(()=>{});
  },[]);

  const cur  = CURRENCIES[F.country];
  const rate = rates[cur.code];
  const toast_ = msg => { setToast(msg); setTimeout(()=>setToast(""),2500); };

  // ── Supabase 미설정 시 모달 자동 오픈 ─────────────────────────
  useEffect(() => {
    if (!isConfigured()) setSbModal(true);
  }, []);

  // ── Supabase 설정 저장 ────────────────────────────────────────
  function handleSaveSbConfig() {
    const url  = sbUrlInp.trim();
    const anon = sbAnonInp.trim();
    if (!url.startsWith('https://') || !url.includes('.supabase.co')) {
      toast_('Project URL 형식이 맞지 않아요 (https://xxx.supabase.co)');
      return;
    }
    if (!anon.startsWith('eyJ')) {
      toast_('Anon Key 형식이 맞지 않아요 (eyJ... 로 시작)');
      return;
    }
    saveSbConfig(url, anon);
    reinitSupabase(url, anon);  // 새 클라이언트 생성 (storageKey 동일)
    setAuthReady(false);
    setSession(null);
    setSbConfigOk(true);
    setSbModal(false);
    toast_('✅ Supabase 연결 설정 완료!');
  }

  function handleClearSbConfig() {
    clearSbConfig();
    setSbConfigOk(false);
    setSbUrlInp('');
    setSbAnonInp('');
    setSbModal(true);
  }

  // ── 익명 자동 로그인 ─────────────────────────────────────
  async function autoLogin() {
    try {
      const { data, error } = await _sbClient.auth.signInAnonymously();
      if (error) {
        console.error('익명 로그인 실패:', error.message);
      } else if (data?.session) {
        setSession(data.session);
      }
    } catch(e) {
      console.error('익명 로그인 오류:', e);
    } finally {
      setAuthReady(true);
    }
  }

  // ── Supabase 세션 감지 ──────────────────────────────────────
  useEffect(() => {
    if (!isConfigured()) { setAuthReady(true); return; }

    _sbClient.auth.getSession().then(async ({ data: { session } }) => {
      if (session) {
        setSession(session);
        setAuthReady(true);
      } else {
        await autoLogin();
      }
    }).catch(async () => {
      await autoLogin();
    });

    const { data: { subscription } } = _sbClient.auth.onAuthStateChange((_event, sess) => {
      setSession(sess);
      if (sess) setAuthReady(true);
    });
    return () => subscription.unsubscribe();
  }, [sbConfigOk]);



  // ── 실시간 자동검사 엔진 ────────────────────────────────────────
  const BANNED_WORDS = ["무료배송","최저가","최고급","100%정품","공식","인증","보장","할인","특가","이벤트","세일","당일발송","빠른배송","무료","원가","도매","대량"];
  const SPECIAL_RE   = /[!@#$%^&*(){}\[\]|\\<>]/g;

  // 카테고리별 금지어
  const CAT_RULES = {
    "전자기기":  { banned:["의약품","식품","화장품"], minDesc:80, reqWords:["충전","호환","보증"] },
    "패션/의류":  { banned:["의약품","식품"], minDesc:60, reqWords:["소재","사이즈","색상"] },
    "뷰티/화장품":{ banned:["의약","치료","효능","효과"], minDesc:80, reqWords:["성분","용량","사용법"] },
    "생활용품":  { banned:["의약품"], minDesc:50, reqWords:[] },
    "스포츠":    { banned:["의약품","화장품"], minDesc:50, reqWords:[] },
    "식품":      { banned:["의약","치료","다이어트 보장"], minDesc:100, reqWords:["원산지","용량","보관방법"] },
    "기타":      { banned:[], minDesc:40, reqWords:[] },
  };

  // 국가별 최소 가격 (현지 통화)
  const MIN_PRICE = { MYR:1, SGD:0.5, TWD:30, THB:30, PHP:50, VND:5000, IDR:1000 };

  const inspection = useMemo(() => {
    const issues = [];
    const name  = F.name.trim();
    const desc  = F.desc.trim();
    const sell     = +F.sellLocal;
    const setBuy   = Math.max(1, +F.setBuy  || 1);
    const setSell  = Math.max(1, +F.setSell || 1);
    const cost     = (+F.costKRW) * (setSell / setBuy); // 세트 원가
    const cat   = F.cat;
    const rule  = CAT_RULES[cat] || CAT_RULES["기타"];

    // ── ① 상품명 검사 ──────────────────────────────────────────
    const nameGroup = { id:"name", label:"상품명", items:[] };

    if (!name) {
      nameGroup.items.push({ level:"error", msg:"상품명을 입력해 주세요" });
    } else {
      // 길이
      if (name.length < 10)
        nameGroup.items.push({ level:"error", msg:`너무 짧아요 (${name.length}자 / 최소 10자)` });
      else if (name.length > 120)
        nameGroup.items.push({ level:"error", msg:`너무 길어요 (${name.length}자 / 최대 120자)` });
      else if (name.length < 25)
        nameGroup.items.push({ level:"warn",  msg:`조금 더 구체적으로 (${name.length}자 / 권장 25자+)` });
      else
        nameGroup.items.push({ level:"pass",  msg:`길이 적정 (${name.length}자)` });

      // 특수문자
      const specials = name.match(SPECIAL_RE);
      if (specials && specials.length > 0)
        nameGroup.items.push({ level:"error", msg:`금지 특수문자 포함: ${[...new Set(specials)].join(" ")}` });
      else
        nameGroup.items.push({ level:"pass",  msg:"특수문자 이상 없음" });

      // 금지어
      const foundBanned = BANNED_WORDS.filter(w => name.includes(w));
      if (foundBanned.length > 0)
        nameGroup.items.push({ level:"error", msg:`금지어 포함: ${foundBanned.join(", ")}` });
      else
        nameGroup.items.push({ level:"pass",  msg:"금지어 없음" });

      // 연속 공백/대문자 남용
      if (/\s{2,}/.test(name))
        nameGroup.items.push({ level:"warn", msg:"연속 공백이 있어요" });
      if ((name.match(/[A-Z]/g)||[]).length > name.length * 0.5 && name.length > 5)
        nameGroup.items.push({ level:"warn", msg:"대문자가 과도하게 많아요" });
    }
    issues.push(nameGroup);

    // ── ② 상품 설명 품질 검사 ──────────────────────────────────
    const descGroup = { id:"desc", label:"상품 설명", items:[] };

    if (!desc) {
      descGroup.items.push({ level:"warn", msg:"설명이 없어요 (판매율에 영향)" });
    } else {
      // 길이
      if (desc.length < rule.minDesc)
        descGroup.items.push({ level:"warn", msg:`설명 부족 (${desc.length}자 / ${cat} 권장 ${rule.minDesc}자+)` });
      else
        descGroup.items.push({ level:"pass", msg:`설명 길이 충분 (${desc.length}자)` });

      // 이모지
      const emojiCount = (desc.match(/\p{Emoji}/gu)||[]).length;
      if (emojiCount === 0)
        descGroup.items.push({ level:"warn", msg:"이모지를 추가하면 클릭률이 올라요" });
      else if (emojiCount > 20)
        descGroup.items.push({ level:"warn", msg:`이모지 과다 (${emojiCount}개 / 권장 20개 이하)` });
      else
        descGroup.items.push({ level:"pass", msg:`이모지 ${emojiCount}개 사용 중` });

      // 카테고리 필수 키워드
      const missingKw = rule.reqWords.filter(w => !desc.includes(w) && !name.includes(w));
      if (missingKw.length > 0)
        descGroup.items.push({ level:"warn", msg:`권장 키워드 누락: ${missingKw.join(", ")}` });
      else if (rule.reqWords.length > 0)
        descGroup.items.push({ level:"pass", msg:"카테고리 핵심 키워드 포함" });

      // 카테고리별 금지어
      const catBanned = rule.banned.filter(w => desc.includes(w));
      if (catBanned.length > 0)
        descGroup.items.push({ level:"error", msg:`${cat} 카테고리 금지어: ${catBanned.join(", ")}` });
      else
        descGroup.items.push({ level:"pass", msg:"카테고리 규정 위반 없음" });
    }
    issues.push(descGroup);

    // ── ③ 가격 정책 검사 ──────────────────────────────────────
    const priceGroup = { id:"price", label:"가격 정책", items:[] };

    if (!sell) {
      priceGroup.items.push({ level:"error", msg:"판매가를 입력해 주세요" });
    } else {
      const minP = MIN_PRICE[cur.code] || 1;
      if (sell < minP)
        priceGroup.items.push({ level:"error", msg:`최소 판매가 미달 (${cur.sym}${minP} 이상 필요)` });
      else
        priceGroup.items.push({ level:"pass", msg:`최소가 기준 충족 (${cur.sym}${sell})` });

      // 정가가 있을 때 할인율
      if (F.origLocal && +F.origLocal > 0) {
        const disc = Math.round((1 - sell / +F.origLocal) * 100);
        if (+F.origLocal <= sell)
          priceGroup.items.push({ level:"error", msg:"정가가 판매가보다 낮거나 같아요" });
        else if (disc > 90)
          priceGroup.items.push({ level:"warn", msg:`할인율 ${disc}% — 너무 높으면 신뢰도 저하` });
        else
          priceGroup.items.push({ level:"pass", msg:`할인율 ${disc}% (정상 범위)` });
      }

      // 마진율
      if (cost && sell) {
        const sf=+F.shopFee, pf=+F.payFee, ship=+F.shipLocal||0, etc=+F.etcKRW||0;
        const sellKRW=sell*rate, feeKRW=sellKRW*(sf+pf)/100, shipKRW=ship*rate;
        const margin = ((sellKRW - cost - feeKRW - shipKRW - etc) / sellKRW) * 100;
        if (margin < 0)
          priceGroup.items.push({ level:"error", msg:`적자 판매 중 (마진율 ${margin.toFixed(1)}%)` });
        else if (margin < 10)
          priceGroup.items.push({ level:"warn", msg:`마진율 위험 (${margin.toFixed(1)}% / 권장 10%+)` });
        else if (margin < 20)
          priceGroup.items.push({ level:"warn", msg:`마진율 보통 (${margin.toFixed(1)}% / 권장 20%+)` });
        else
          priceGroup.items.push({ level:"pass", msg:`마진율 양호 (${margin.toFixed(1)}%)` });
      }
    }
    issues.push(priceGroup);

    // ── ④ 카테고리 규정 검사 ──────────────────────────────────
    const catGroup = { id:"cat", label:"카테고리 규정", items:[] };

    // 식품 무게 필수
    if (cat === "식품" && !F.weight)
      catGroup.items.push({ level:"warn", msg:"식품은 무게 입력을 권장해요" });
    else if (F.weight && +F.weight > 0)
      catGroup.items.push({ level:"pass", msg:`무게 ${F.weight}kg 입력됨` });

    // 뷰티 설명 필수
    if (cat === "뷰티/화장품" && desc.length < 80)
      catGroup.items.push({ level:"warn", msg:"뷰티 카테고리는 성분·용량 설명 필수" });

    // 전자기기 무게 권장
    if (cat === "전자기기" && !F.weight)
      catGroup.items.push({ level:"warn", msg:"전자기기는 무게 입력을 권장해요 (배송비 계산)" });

    // 재고
    if (!F.stock || +F.stock < 1)
      catGroup.items.push({ level:"error", msg:"재고 수량을 입력해 주세요" });
    else if (+F.stock < 10)
      catGroup.items.push({ level:"warn", msg:`재고 부족 (${F.stock}개 / 권장 10개+)` });
    else
      catGroup.items.push({ level:"pass", msg:`재고 ${F.stock}개` });

    // 수수료 설정 확인
    if (+F.shopFee === 0)
      catGroup.items.push({ level:"warn", msg:"쇼피 수수료 0% — 정확한지 확인해 주세요" });
    else
      catGroup.items.push({ level:"pass", msg:`수수료 설정 완료 (${F.shopFee}% + ${F.payFee}%)` });

    if (catGroup.items.length === 0)
      catGroup.items.push({ level:"pass", msg:"카테고리 규정 이상 없음" });

    issues.push(catGroup);

    // 전체 점수 계산
    const allItems = issues.flatMap(g => g.items);
    const errors  = allItems.filter(i => i.level === "error").length;
    const warns   = allItems.filter(i => i.level === "warn").length;
    const passes  = allItems.filter(i => i.level === "pass").length;
    const total   = allItems.length;
    const score   = total > 0 ? Math.round((passes / total) * 100) : 0;

    return { groups: issues, errors, warns, passes, score };
  }, [F, cur, rate]);


    // ── 번역 + 쇼피 검색 (구글 번역 무료 API) ──────────────────
  // 국가별 현지어 코드
  const LOCALE_MAP = {MY:"ms",SG:"en",TW:"zh-TW",TH:"th",PH:"en",VN:"vi",ID:"id"};

  async function translateAndSearch() {
    if(!F.name.trim()){ toast_("상품명을 먼저 입력해 주세요!"); return; }
    setXlLoad(true); setXlResult(null);
    try {
      // 영어 번역
      const enName = await googleTranslate(F.name, "en");
      // 현지어 번역 (국가별)
      const localMap = {};
      await Promise.all(Object.entries(CURRENCIES).map(async ([code, cv]) => {
        const lang = LOCALE_MAP[code] || "en";
        localMap[code] = lang === "en" ? enName : await googleTranslate(F.name, lang);
      }));
      setXlResult({ en: enName, localMap });
      setSearchOpen(true);
      toast_("🌐 번역 완료! 아래 링크로 쇼피 검색해 보세요");

      toast_("번역 실패: " + e.message);

  // ── 상품 추가 ─────────────────────────────────────────────────
  function addItem() {
    const name=F.name.trim(), costEach=+F.costKRW, sell=+F.sellLocal;
    if(!name||!costEach||!sell){ toast_("상품명·매입가·판매가를 입력해 주세요."); return; }
    const setBuy  = Math.max(1, +F.setBuy  || 1); // 매입 수량 (1개씩 살 때)
    const setSell = Math.max(1, +F.setSell || 1); // 세트 판매 수량
    // 세트 원가 = 개당 매입가 × 세트에 들어가는 개수
    // ex) 1개씩 매입 → 3개 세트 판매: costKRW = costEach × (setSell/setBuy)
    const costKRW = costEach * (setSell / setBuy);
    const sf=+F.shopFee, pf=+F.payFee, ship=+F.shipLocal||0, etc=+F.etcKRW||0;
    const sellKRW=sell*rate, feeKRW=sellKRW*(sf+pf)/100, shipKRW=ship*rate;
    const totalCost=costKRW+feeKRW+shipKRW+etc;
    const profit=sellKRW-totalCost, margin=(profit/sellKRW)*100;
    const isSet = setBuy!==1||setSell!==1;
    const newItem = {
      id:uid, name, desc:F.desc, cat:F.cat, country:F.country, cur, rate,
      costEach,
      costKRW,
      setBuy, setSell, isSet,
      sellLocal:sell, origLocal:+F.origLocal||null, sellKRW,
      shopFee:sf, payFee:pf, shipLocal:ship, shipKRW, etcKRW:etc,
      feeKRW, totalCost, profit, margin,
      stock:+F.stock||100, weight:+F.weight||null,
    };
    setItems(prev=>[...prev, newItem]);

    // ── orders.html과 상품 공유 — localStorage 저장 ──────────
    try {
      const saved = JSON.parse(localStorage.getItem('shopee_products')||'[]');
      // 같은 이름+국가 상품이 없으면 추가
      const exists = saved.find(p=>p.name===name && p.country===F.country);
      if (!exists) {
        saved.push({
          id: Date.now(),
          name,
          country: F.country,
          price: String(sell),
          cost:  String(Math.round(costKRW)),
          stock: String(+F.stock||100),
          sku:   "",
          setBuy:  String(setBuy),
          setSell: String(setSell),
        });
        localStorage.setItem('shopee_products', JSON.stringify(saved));
      }
    } catch(e) { console.warn('상품 공유 저장 실패:', e); }

    setUid(n=>n+1);
    setF(f=>({...f,name:"",desc:"",costKRW:"",sellLocal:"",origLocal:"",weight:"",setBuy:"1",setSell:"1"}));
    toast_("✅ 상품 추가 완료! 주문관리에서도 선택 가능해요"); setTab("list");
  }

            onClick={()=>setInspOpen(o=>!o)}
            style={{...card,padding:"12px 16px",marginBottom:inspOpen?10:0,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",userSelect:"none"}}
          >
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{
                width:32,height:32,borderRadius:8,
                background: inspection.errors>0?"#fee2e2": inspection.warns>0?"#fef3c7":"#dcfce7",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0
              }}>
                {inspection.errors>0?"🚨": inspection.warns>0?"⚠️":"✅"}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:C.txt}}>규정 자동검사</div>
                <div style={{fontSize:11,color:C.txtSm,marginTop:1}}>
                  {inspection.errors>0
                    ? <span style={{color:"#dc2626",fontWeight:700}}>오류 {inspection.errors}개 수정 필요</span>
                    : inspection.warns>0
                    ? <span style={{color:"#d97706",fontWeight:700}}>경고 {inspection.warns}개</span>
                    : <span style={{color:C.grn,fontWeight:700}}>모든 항목 통과</span>
                  }
                </div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {/* 점수 링 */}
              <div style={{position:"relative",width:40,height:40,flexShrink:0}}>
                <svg width="40" height="40" viewBox="0 0 40 40">
                  <circle cx="20" cy="20" r="16" fill="none" stroke={C.border} strokeWidth="4"/>
                  <circle cx="20" cy="20" r="16" fill="none"
                    stroke={inspection.score>=80?C.grn:inspection.score>=50?"#d97706":"#dc2626"}
                    strokeWidth="4"
                    strokeDasharray={`${inspection.score * 1.005} ${100.5 - inspection.score * 1.005}`}
                    strokeDashoffset="25.1"
                    strokeLinecap="round"
                    style={{transition:"stroke-dasharray .4s"}}
                    transform="rotate(-90 20 20)"
                  />
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:C.txt}}>{inspection.score}</div>
              </div>
              <span style={{fontSize:16,color:C.txtSm,transition:"transform .2s",display:"inline-block",transform:inspOpen?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
            </div>
          </div>

          {inspOpen && (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {inspection.groups.map(group=>(
                <div key={group.id} style={{...card,overflow:"hidden"}}>
                  {/* 그룹 헤더 */}
                  <div style={{padding:"9px 14px",background:C.bg,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,fontWeight:700,color:C.txtMd,letterSpacing:".06em",textTransform:"uppercase"}}>
                      { group.id==="name"?"📝 상품명"
                      : group.id==="desc"?"📄 상품 설명"
                      : group.id==="price"?"💰 가격 정책"
                      : "📋 카테고리 규정"}
                    </span>
                    <div style={{display:"flex",gap:4}}>
                      {group.items.filter(i=>i.level==="error").length>0 &&
                        <span style={{fontSize:10,fontWeight:700,background:"#fee2e2",color:"#b91c1c",borderRadius:4,padding:"1px 6px"}}>{group.items.filter(i=>i.level==="error").length} 오류</span>}
                      {group.items.filter(i=>i.level==="warn").length>0 &&
                        <span style={{fontSize:10,fontWeight:700,background:"#fef3c7",color:"#92400e",borderRadius:4,padding:"1px 6px"}}>{group.items.filter(i=>i.level==="warn").length} 경고</span>}
                      {group.items.every(i=>i.level==="pass") &&
                        <span style={{fontSize:10,fontWeight:700,background:"#dcfce7",color:"#15803d",borderRadius:4,padding:"1px 6px"}}>통과</span>}
                    </div>
                  </div>
                  {/* 항목 목록 */}
                  {group.items.map((item,idx)=>(
                    <div key={idx} style={{
                      display:"flex",alignItems:"flex-start",gap:8,
                      padding:"8px 14px",
                      borderBottom:idx<group.items.length-1?`1px solid ${C.border}`:"none",
                      background: item.level==="error"?"rgba(220,38,38,.04)"
                                : item.level==="warn" ?"rgba(217,119,6,.04)"
                                : "transparent",
                      transition:"background .15s"
                    }}>
                      <span style={{
                        fontSize:13,flexShrink:0,marginTop:1,
                        filter: item.level==="pass"?"grayscale(0.2)":"none"
                      }}>
                        {item.level==="error"?"🔴": item.level==="warn"?"🟡":"🟢"}
                      </span>
                      <span style={{
                        fontSize:12,lineHeight:1.5,
                        color: item.level==="error"?"#b91c1c"
                             : item.level==="warn" ?"#92400e"
                             : C.txtMd,
                        fontWeight: item.level==="pass"?400:500
                      }}>{item.msg}</span>
                    </div>
                  ))}
                </div>
              ))}

              {/* 전체 요약 */}
              <div style={{...card,padding:"12px 16px",background: inspection.errors===0&&inspection.warns===0?C.grnBg: inspection.errors>0?"#fff1f2":"#fffbeb",border:`1px solid ${inspection.errors===0&&inspection.warns===0?"#86efac":inspection.errors>0?"#fca5a5":"#fcd34d"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:inspection.errors===0&&inspection.warns===0?0:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:C.txt}}>종합 점수</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:800,color:inspection.score>=80?C.grn:inspection.score>=50?"#d97706":"#dc2626"}}>{inspection.score}점</span>
                </div>
                {inspection.errors>0 && <div style={{fontSize:11,color:"#b91c1c"}}>⛔ 오류 {inspection.errors}개를 수정해야 등록할 수 있어요</div>}
                {inspection.errors===0&&inspection.warns>0 && <div style={{fontSize:11,color:"#92400e"}}>⚠️ 경고 {inspection.warns}개 — 수정하면 판매율이 올라요</div>}
                {inspection.errors===0&&inspection.warns===0 && <div style={{fontSize:11,color:C.grn,marginTop:2}}>🎉 모든 규정을 통과했어요! 등록해도 좋아요</div>}
              </div>
            </div>
          )}
        {/* 오른쪽 검사 패널 끝 */}

      )}
      </div>

      {/* ══ 목록 탭 (모바일 전용) ══ */}
      {tab==="list" && (
        <div style={{padding:"20px 16px",maxWidth:640,margin:"0 auto"}}>
          {items.length===0 ? (
            <div style={{...card,textAlign:"center",padding:"60px 20px"}}>
              <div style={{fontSize:48,marginBottom:14,opacity:.3}}>📦</div>
              <div style={{fontSize:15,fontWeight:700,color:C.txtMd,marginBottom:6}}>등록된 상품이 없어요</div>
              <div style={{fontSize:13,color:C.txtSm,marginBottom:20}}>상품을 입력하고 마진을 분석해 보세요</div>
              <button onClick={()=>setTab("form")} style={{...btnOr,padding:"10px 24px"}}>📝 상품 입력하러 가기</button>
            </div>
          ) : (
            <>
              {/* 요약 */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
                {(()=>{
                  const avg=items.reduce((a,p)=>a+p.margin,0)/items.length;
                  const best=[...items].sort((a,b)=>b.margin-a.margin)[0];
                  const worst=[...items].sort((a,b)=>a.margin-b.margin)[0];
                  return [
                    {label:"총 상품",val:`${items.length}개`,color:C.txt,bg:C.white},
                    {label:"평균 마진",val:`${ff(avg)}%`,color:mCol(avg),bg:C.white},
                    {label:"최고 마진",val:best.name.slice(0,5)+(best.name.length>5?"…":""),color:C.grn,bg:C.grnBg},
                    {label:"주의 상품",val:worst.margin<15?worst.name.slice(0,5)+(worst.name.length>5?"…":""):"없음",color:worst.margin<15?"#dc2626":C.txtSm,bg:worst.margin<15?"#fee2e2":C.white},
                  ];
                })().map(({label,val,color,bg})=>(
                  <div key={label} style={{background:bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 8px",textAlign:"center",boxShadow:`0 1px 4px ${C.shadow}`}}>
                    <div style={{fontSize:10,color:C.txtSm,marginBottom:5,fontWeight:600,letterSpacing:".04em",textTransform:"uppercase"}}>{label}</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color,wordBreak:"break-all"}}>{val}</div>
                  </div>
                ))}
              </div>

              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
                <button onClick={()=>{if(window.confirm("전체 삭제할까요?"))setItems([]);}}
                  style={{background:C.white,border:`1px solid ${C.border}`,color:C.txtSm,borderRadius:7,padding:"5px 14px",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
                  {"전체 삭제"}
                </button>
              </div>

              {items.map(p=>{
                const m=mLbl(p.margin), barW=Math.min(Math.max(p.margin,0),60)/60*100;
                return (
                  <div key={p.id} style={{...card,marginBottom:14,overflow:"hidden"}}>
                    <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:14.5,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",color:C.txt}}>
                          {p.name}
                          <span style={{background:m.bg,color:m.c,padding:"2px 8px",borderRadius:5,fontSize:10,fontWeight:700}}>{m.t}</span>
                        </div>
                        <div style={{fontSize:11,color:C.txtSm,marginTop:4}}>{p.cat} · {p.cur.name} · 환율 {p.rate>=1?Math.round(p.rate).toLocaleString():p.rate.toFixed(4)} KRW</div>
                      </div>
                      <button onClick={()=>setItems(x=>x.filter(i=>i.id!==p.id))}
                        style={{background:"none",border:`1px solid ${C.border}`,color:C.txtSm,cursor:"pointer",fontSize:13,padding:"3px 8px",flexShrink:0,lineHeight:1,borderRadius:6,fontWeight:700}}>✕</button>
                    </div>

                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)"}}>
                      {[
                        {label:"매입가",     val:won(p.costKRW),                              color:C.txtMd, bg:C.bg},
                        {label:`판매가(${p.cur.code})`,val:`${p.cur.sym}${ff(p.sellLocal)}`,  color:C.txt,   bg:C.bg},
                        {label:"원화 판매가",val:won(p.sellKRW),                              color:C.acc,   bg:C.accLight,bold:true},
                        {label:"수수료",     val:won(p.feeKRW),                               color:C.txtSm, bg:C.bg},
                        {label:"배송비",     val:won(p.shipKRW),                              color:C.txtSm, bg:C.bg},
                        {label:"순이익",     val:`${p.profit>=0?"+":""}${won(p.profit)}`,     color:mCol(p.margin),bg:mLbl(p.margin).bg,bold:true},
                      ].map(({label,val,color,bg,bold})=>(
                        <div key={label} style={{background:bg,padding:"10px 8px",textAlign:"center",borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`}}>
                          <div style={{fontSize:10,color:C.txtSm,marginBottom:3,fontWeight:600}}>{label}</div>
                          <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:bold?700:600,color,wordBreak:"break-all"}}>{val}</div>
                        </div>
                      ))}
                    </div>

                    <div style={{padding:"12px 16px 10px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}>
                        <span style={{color:C.txtSm,fontWeight:600}}>마진율</span>
                        <span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:mCol(p.margin)}}>{ff(p.margin)}%</span>
                      </div>
                      <div style={{height:6,background:C.bgAlt,borderRadius:4,overflow:"hidden",border:`1px solid ${C.border}`}}>
                        <div style={{height:"100%",width:`${barW}%`,background:`linear-gradient(90deg,${mCol(p.margin)},${mCol(p.margin)}cc)`,borderRadius:4,transition:"width .5s"}}></div>
                      </div>
                    </div>

                    <div style={{display:"flex",gap:10,padding:"10px 16px 14px",borderTop:`1px solid ${C.border}`}}>
                      <a href={`${p.cur.searchUrl}${encodeURIComponent(p.name)}`} target="_blank" rel="noreferrer"
                        style={{...btnGh,flex:1,textAlign:"center",textDecoration:"none",display:"block",padding:"9px 8px"}}>
                        {"🔍 쇼피 검색"}
                      </a>
                      <button onClick={()=>setSheet(p)} style={{...btnOr,flex:1,padding:"9px 8px",borderRadius:10}}>
                        {"📋 등록 시트"}
                      </button>
                    </div>
                  </div>
                );
              })}

              <button onClick={()=>setTab("form")}
                style={{width:"100%",background:C.white,border:`1.5px dashed ${C.borderMd}`,color:C.txtSm,borderRadius:12,padding:"13px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600,marginTop:4}}>
                {"+ 상품 더 추가하기"}
              </button>
            </>
          )}
        </div>
      )}

      {/* ── Supabase 설정 모달 ── */}
      {sbModal && (
        <div onClick={e=>{ if(e.target===e.currentTarget && sbConfigOk) setSbModal(false); }}
          style={{position:"fixed",inset:0,background:"rgba(26,15,10,.55)",backdropFilter:"blur(10px)",zIndex:1200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:20,width:"100%",maxWidth:460,boxShadow:`0 24px 60px rgba(238,77,45,.12)`}}>

            {/* 헤더 */}
            <div style={{padding:"20px 22px 16px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:12,background:C.accLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🔗</div>
                <div>
                  <div style={{fontSize:15,fontWeight:800,color:C.txt}}>Supabase 연결 설정</div>
                  <div style={{fontSize:11,color:C.txtSm,marginTop:1}}>프로젝트 URL과 Anon Key를 입력해 주세요</div>
                </div>
                {sbConfigOk && <button onClick={()=>setSbModal(false)} style={{marginLeft:"auto",background:C.bg,border:`1px solid ${C.border}`,color:C.txtSm,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
              </div>
            </div>

            <div style={{padding:"18px 22px 22px"}}>
              {/* 안내 */}
              <div style={{background:C.accLight,border:`1px solid #fcd5c8`,borderRadius:10,padding:"11px 14px",marginBottom:16,fontSize:12,color:C.txtMd,lineHeight:1.7}}>
                <div style={{fontWeight:700,marginBottom:4}}>📌 값 확인 방법</div>
                <div>1. <a href="https://supabase.com/dashboard" target="_blank" rel="noreferrer" style={{color:C.acc,fontWeight:600}}>supabase.com/dashboard</a> 접속</div>
                <div>2. 프로젝트 선택 → <strong style={{fontWeight:600}}>Settings → API</strong></div>
                <div>3. Project URL + anon public key 복사</div>
              </div>

              {/* Project URL */}
              <div style={{marginBottom:12}}>
                <label style={{...lbl,marginBottom:5}}>Project URL</label>
                <input style={{...inp,fontFamily:"'DM Mono',monospace",fontSize:12}}
                  placeholder="https://xxxxxxxxxxxxxxxx.supabase.co"
                  value={sbUrlInp}
                  onChange={e=>setSbUrlInp(e.target.value)}
                  onFocus={e=>e.target.style.borderColor=C.acc}
                  onBlur={e=>e.target.style.borderColor=C.border}
                />
              </div>

              {/* Anon Key */}
              <div style={{marginBottom:18}}>
                <label style={{...lbl,marginBottom:5}}>Anon public key</label>
                <textarea style={{...inp,minHeight:72,resize:"vertical",fontFamily:"'DM Mono',monospace",fontSize:11,lineHeight:1.5}}
                  placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  value={sbAnonInp}
                  onChange={e=>setSbAnonInp(e.target.value)}
                  onFocus={e=>e.target.style.borderColor=C.acc}
                  onBlur={e=>e.target.style.borderColor=C.border}
                />
              </div>

              {/* 현재 상태 */}
              {sbConfigOk && (
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"8px 12px",background:C.grnBg,borderRadius:8,border:"1px solid #86efac"}}>
                  <span style={{fontSize:13}}>✅</span>
                  <span style={{fontSize:11,color:C.grn,fontWeight:600,flex:1}}>연결 설정됨: {getSbUrl().replace('https://','').split('.')[0]}...</span>
                  <button onClick={handleClearSbConfig}
                    style={{background:"none",border:"1px solid #86efac",color:C.grn,borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>
                    {"초기화"}
                  </button>
                </div>
              )}

              <div style={{display:"flex",gap:10}}>
                {sbConfigOk && (
                  <button onClick={()=>setSbModal(false)} style={{...btnGh,flex:1}}>취소</button>
                )}
                <button onClick={handleSaveSbConfig} style={{...btnOr,flex:2,padding:"12px"}}>
                  {"🔗 저장하고 연결하기"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}


            {sheet && <Sheet p={sheet}/>}

      {toast && (
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:C.txt,color:"#fff",padding:"10px 24px",borderRadius:30,fontSize:13,fontWeight:700,zIndex:9999,pointerEvents:"none",whiteSpace:"nowrap",boxShadow:"0 6px 24px rgba(26,15,10,.25)"}}>
          {toast}
        </div>
      )}

    </div>
  );
}

  <!-- PWA 서비스워커 + 동적 manifest -->
  <script>
    // 현재 경로 기반으로 manifest 동적 생성
    (function() {
      const base    = window.location.pathname.replace(/\/[^/]*$/, '') + '/';
      const origin  = window.location.origin;
      const manifest = {
        name: "쇼피 셀러 툴",
        short_name: "쇼피툴",
        description: "쇼피 셀러를 위한 마진 계산기 & 주문 관리",
        start_url: origin + base + "index.html",
        scope: origin + base,
        display: "standalone",
        orientation: "portrait",
        background_color: "#FFF8F5",
        theme_color: "#EE4D2D",
        lang: "ko",
        icons: [
          { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%23EE4D2D'/><text x='50%25' y='55%25' font-size='100' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='sans-serif' font-weight='bold'>S</text></svg>", sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
          { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%23EE4D2D'/><text x='50%25' y='55%25' font-size='280' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='sans-serif' font-weight='bold'>S</text></svg>", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
        ],
        shortcuts: [
          { name: "주문 관리", short_name: "주문", url: origin + base + "orders.html" },
          { name: "마진 계산기", short_name: "계산기", url: origin + base + "index.html" }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const url  = URL.createObjectURL(blob);
      document.getElementById('pwa-manifest').href = url;
    })();

    // 서비스워커 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swUrl = window.location.pathname.replace(/\/[^/]*$/, '') + '/sw.js';
        navigator.serviceWorker.register(swUrl)
          .then(reg => console.log('SW 등록:', reg.scope))
          .catch(err => console.log('SW 실패:', err));
      });
    }

    // iOS Safari PWA 설치 힌트
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
    if (isIOS && !isStandalone && !localStorage.getItem('pwa-hint-shown')) {
      setTimeout(() => {
        const hint = document.createElement('div');
        hint.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1A0F0A;color:#fff;padding:12px 18px;border-radius:12px;font-size:12px;z-index:999;text-align:center;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
        hint.innerHTML = '📱 홈 화면에 추가하려면<br>Safari → 공유 → 홈 화면에 추가 <button onclick="this.parentElement.remove();localStorage.setItem("pwa-hint-shown",1)" style="background:none;border:none;color:#ffa07a;font-size:14px;cursor:pointer;margin-left:8px;">✕</button>';
        document.body.appendChild(hint);
        setTimeout(() => hint.remove(), 6000);
      }, 3000);
    }
  </script>
</body>
