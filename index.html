  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    // ── Supabase 설정 (localStorage에서 로드) ────────────────
    const SB_URL_KEY  = 'shopee_sb_url';
    const SB_KEY_KEY  = 'shopee_sb_anon';

    function getSbUrl()  { return localStorage.getItem(SB_URL_KEY)  || ''; }
    function getSbAnon() { return localStorage.getItem(SB_KEY_KEY) || ''; }
    function saveSbConfig(url, anon) {
      localStorage.setItem(SB_URL_KEY,  url.trim());
      localStorage.setItem(SB_KEY_KEY, anon.trim());
    }
    function clearSbConfig() {
      localStorage.removeItem(SB_URL_KEY);
      localStorage.removeItem(SB_KEY_KEY);
    }
    function isConfigured() {
      const u = getSbUrl(), a = getSbAnon();
      return u.startsWith('https://') && u.includes('.supabase.co') && a.startsWith('eyJ');
    }

    // supabase 클라이언트 — 설정 저장 후 재생성
    let _sbUrl  = getSbUrl()  || 'https://placeholder.supabase.co';
    let _sbAnon = getSbAnon() || 'placeholder';
    let supabase = window.supabase.createClient(_sbUrl, _sbAnon);

    function reinitSupabase(url, anon) {
      supabase = window.supabase.createClient(url, anon);
    }

    function getEdgeFnUrl() {
      return getSbUrl() + '/functions/v1/ai-proxy';
    }



// ── 상수 ────────────────────────────────────────────────────────

async function fileToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("읽기 실패"));
    r.readAsDataURL(file);
  });
}

// ── 메인 ──────────────────────────────────────────────────────
function App() {
  const [tab,     setTab]     = useState("form");
  const [rates,   setRates]   = useState(RATES0);
  const [items,   setItems]   = useState([]);
  const [uid,     setUid]     = useState(1);
  const [sheet,   setSheet]   = useState(null);
  const [toast,   setToast]   = useState("");
  const [aiLang,  setAiLang]  = useState("ko");
  const [aiLoad,  setAiLoad]  = useState(false);
  const [aiMsg,   setAiMsg]   = useState("상품명 입력 후 ✨ 버튼을 눌러 AI 설명을 생성해 보세요");
  const [xlLoad,  setXlLoad]  = useState(false);
  const [xlResult,setXlResult]= useState(null);
  const [visionModal,  setVisionModal]  = useState(null);
  const [visionImg,    setVisionImg]    = useState(null);
  const [visionLoad,   setVisionLoad]   = useState(false);
  const [visionResult, setVisionResult] = useState(null);
  const visionInputRef = useRef(null);
  const dropRef = useRef(null);
  const [inspOpen,  setInspOpen]  = useState(true);

  // ── Supabase 설정 모달 상태 ──
  const [sbModal,   setSbModal]   = useState(false);
  const [sbUrlInp,  setSbUrlInp]  = useState('');
  const [sbAnonInp, setSbAnonInp] = useState('');
  const [sbConfigOk,setSbConfigOk]= useState(() => isConfigured());

  // ── Auth 상태 ──
  const [session,   setSession]   = useState(null);   // Supabase session
  const [authReady, setAuthReady] = useState(false);  // 초기 세션 로드 완료
  const [authMode,  setAuthMode]  = useState('login');// 'login' | 'signup' | 'reset'
  const [authEmail, setAuthEmail] = useState('');
  const [authPw,    setAuthPw]    = useState('');
  const [authPwShow,setAuthPwShow]= useState(false);
  const [authLoad,  setAuthLoad]  = useState(false);
  const [authErr,   setAuthErr]   = useState('');
  const [authMsg,   setAuthMsg]   = useState('');

  const [F, setF] = useState({
    name:"", desc:"", cat:"전자기기", country:"MY",
    costKRW:"", sellLocal:"", origLocal:"",
    stock:"100", weight:"",
    shopFee:3, payFee:2, shipLocal:"10", etcKRW:"0",
  });
  const set = k => v => setF(f=>({...f,[k]:v}));

  useEffect(()=>{
    fetch("https://api.exchangerate-api.com/v4/latest/KRW")
      .then(r=>r.json()).then(d=>{
        const r={...RATES0};
        Object.keys(r).forEach(c=>{ if(d.rates[c]) r[c]=1/d.rates[c]; });
        setRates(r);
      }).catch(()=>{});
  },[]);

  const cur  = CURRENCIES[F.country];
  const rate = rates[cur.code];
  const toast_ = msg => { setToast(msg); setTimeout(()=>setToast(""),2500); };

  // ── Supabase 미설정 시 모달 자동 오픈 ─────────────────────────
  useEffect(() => {
    if (!isConfigured()) setSbModal(true);
  }, []);

  // ── Supabase 설정 저장 ────────────────────────────────────────
  function handleSaveSbConfig() {
    const url  = sbUrlInp.trim();
    const anon = sbAnonInp.trim();
    if (!url.startsWith('https://') || !url.includes('.supabase.co')) {
      toast_('Project URL 형식이 맞지 않아요 (https://xxx.supabase.co)');
      return;
    }
    if (!anon.startsWith('eyJ')) {
      toast_('Anon Key 형식이 맞지 않아요 (eyJ... 로 시작)');
      return;
    }
    saveSbConfig(url, anon);
    reinitSupabase(url, anon);
    setAuthReady(false);  // 세션 재감지 트리거
    setSession(null);
    setSbConfigOk(true);
    setSbModal(false);
    toast_('✅ Supabase 연결 설정 완료! 로그인해 주세요.');
  }

  function handleClearSbConfig() {
    clearSbConfig();
    setSbConfigOk(false);
    setSbUrlInp('');
    setSbAnonInp('');
    setSbModal(true);
  }

  // ── Supabase 세션 감지 ──────────────────────────────────────
  useEffect(() => {
    // 설정이 안 된 경우 세션 감지 생략 → 즉시 준비 완료 처리
    if (!isConfigured()) {
      setAuthReady(true);
      return;
    }
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthReady(true);
    }).catch(() => {
      // 연결 실패해도 화면은 보여줌
      setAuthReady(true);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      setAuthReady(true);
    });
    return () => subscription.unsubscribe();
  }, [sbConfigOk]); // sbConfigOk 바뀔 때마다 재실행

  // ── 로그인 ────────────────────────────────────────────────
  async function handleLogin() {
    setAuthLoad(true); setAuthErr(''); setAuthMsg('');
    const { error } = await supabase.auth.signInWithPassword({ email: authEmail.trim(), password: authPw });
    if (error) setAuthErr(error.message === 'Invalid login credentials' ? '이메일 또는 비밀번호가 틀렸어요' : error.message);
    setAuthLoad(false);
  }

  // ── 회원가입 ──────────────────────────────────────────────
  async function handleSignup() {
    if (authPw.length < 6) { setAuthErr('비밀번호는 6자 이상이어야 해요'); return; }
    setAuthLoad(true); setAuthErr(''); setAuthMsg('');
    const { error } = await supabase.auth.signUp({ email: authEmail.trim(), password: authPw });
    if (error) setAuthErr(error.message);
    else setAuthMsg('📧 확인 이메일을 보냈어요. 받은 편지함을 확인해 주세요!');
    setAuthLoad(false);
  }

  // ── 비밀번호 재설정 ───────────────────────────────────────
  async function handleReset() {
    if (!authEmail.trim()) { setAuthErr('이메일을 입력해 주세요'); return; }
    setAuthLoad(true); setAuthErr(''); setAuthMsg('');
    const { error } = await supabase.auth.resetPasswordForEmail(authEmail.trim());
    if (error) setAuthErr(error.message);
    else setAuthMsg('📧 비밀번호 재설정 링크를 보냈어요!');
    setAuthLoad(false);
  }

  // ── 로그아웃 ──────────────────────────────────────────────
  async function handleLogout() {
    await supabase.auth.signOut();
    toast_('로그아웃 됐어요');
  }

  // ── Google 로그인 ─────────────────────────────────────────
  async function handleGoogleLogin() {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
  }

  // ── 실시간 자동검사 엔진 ────────────────────────────────────────
  const BANNED_WORDS = ["무료배송","최저가","최고급","100%정품","공식","인증","보장","할인","특가","이벤트","세일","당일발송","빠른배송","무료","원가","도매","대량"];
  const SPECIAL_RE   = /[!@#$%^&*(){}\[\]|\\<>]/g;

  // 카테고리별 금지어
  const CAT_RULES = {
    "전자기기":  { banned:["의약품","식품","화장품"], minDesc:80, reqWords:["충전","호환","보증"] },
    "패션/의류":  { banned:["의약품","식품"], minDesc:60, reqWords:["소재","사이즈","색상"] },
    "뷰티/화장품":{ banned:["의약","치료","효능","효과"], minDesc:80, reqWords:["성분","용량","사용법"] },
    "생활용품":  { banned:["의약품"], minDesc:50, reqWords:[] },
    "스포츠":    { banned:["의약품","화장품"], minDesc:50, reqWords:[] },
    "식품":      { banned:["의약","치료","다이어트 보장"], minDesc:100, reqWords:["원산지","용량","보관방법"] },
    "기타":      { banned:[], minDesc:40, reqWords:[] },
  };

  // 국가별 최소 가격 (현지 통화)
  const MIN_PRICE = { MYR:1, SGD:0.5, TWD:30, THB:30, PHP:50, VND:5000, IDR:1000 };

  const inspection = useMemo(() => {
    const issues = [];
    const name  = F.name.trim();
    const desc  = F.desc.trim();
    const sell  = +F.sellLocal;
    const cost  = +F.costKRW;
    const cat   = F.cat;
    const rule  = CAT_RULES[cat] || CAT_RULES["기타"];

    // ── ① 상품명 검사 ──────────────────────────────────────────
    const nameGroup = { id:"name", label:"상품명", items:[] };

    if (!name) {
      nameGroup.items.push({ level:"error", msg:"상품명을 입력해 주세요" });
    } else {
      // 길이
      if (name.length < 10)
        nameGroup.items.push({ level:"error", msg:`너무 짧아요 (${name.length}자 / 최소 10자)` });
      else if (name.length > 120)
        nameGroup.items.push({ level:"error", msg:`너무 길어요 (${name.length}자 / 최대 120자)` });
      else if (name.length < 25)
        nameGroup.items.push({ level:"warn",  msg:`조금 더 구체적으로 (${name.length}자 / 권장 25자+)` });
      else
        nameGroup.items.push({ level:"pass",  msg:`길이 적정 (${name.length}자)` });

      // 특수문자
      const specials = name.match(SPECIAL_RE);
      if (specials && specials.length > 0)
        nameGroup.items.push({ level:"error", msg:`금지 특수문자 포함: ${[...new Set(specials)].join(" ")}` });
      else
        nameGroup.items.push({ level:"pass",  msg:"특수문자 이상 없음" });

      // 금지어
      const foundBanned = BANNED_WORDS.filter(w => name.includes(w));
      if (foundBanned.length > 0)
        nameGroup.items.push({ level:"error", msg:`금지어 포함: ${foundBanned.join(", ")}` });
      else
        nameGroup.items.push({ level:"pass",  msg:"금지어 없음" });

      // 연속 공백/대문자 남용
      if (/\s{2,}/.test(name))
        nameGroup.items.push({ level:"warn", msg:"연속 공백이 있어요" });
      if ((name.match(/[A-Z]/g)||[]).length > name.length * 0.5 && name.length > 5)
        nameGroup.items.push({ level:"warn", msg:"대문자가 과도하게 많아요" });
    }
    issues.push(nameGroup);

    // ── ② 상품 설명 품질 검사 ──────────────────────────────────
    const descGroup = { id:"desc", label:"상품 설명", items:[] };

    if (!desc) {
      descGroup.items.push({ level:"warn", msg:"설명이 없어요 (판매율에 영향)" });
    } else {
      // 길이
      if (desc.length < rule.minDesc)
        descGroup.items.push({ level:"warn", msg:`설명 부족 (${desc.length}자 / ${cat} 권장 ${rule.minDesc}자+)` });
      else
        descGroup.items.push({ level:"pass", msg:`설명 길이 충분 (${desc.length}자)` });

      // 이모지
      const emojiCount = (desc.match(/\p{Emoji}/gu)||[]).length;
      if (emojiCount === 0)
        descGroup.items.push({ level:"warn", msg:"이모지를 추가하면 클릭률이 올라요" });
      else if (emojiCount > 20)
        descGroup.items.push({ level:"warn", msg:`이모지 과다 (${emojiCount}개 / 권장 20개 이하)` });
      else
        descGroup.items.push({ level:"pass", msg:`이모지 ${emojiCount}개 사용 중` });

      // 카테고리 필수 키워드
      const missingKw = rule.reqWords.filter(w => !desc.includes(w) && !name.includes(w));
      if (missingKw.length > 0)
        descGroup.items.push({ level:"warn", msg:`권장 키워드 누락: ${missingKw.join(", ")}` });
      else if (rule.reqWords.length > 0)
        descGroup.items.push({ level:"pass", msg:"카테고리 핵심 키워드 포함" });

      // 카테고리별 금지어
      const catBanned = rule.banned.filter(w => desc.includes(w));
      if (catBanned.length > 0)
        descGroup.items.push({ level:"error", msg:`${cat} 카테고리 금지어: ${catBanned.join(", ")}` });
      else
        descGroup.items.push({ level:"pass", msg:"카테고리 규정 위반 없음" });
    }
    issues.push(descGroup);

    // ── ③ 가격 정책 검사 ──────────────────────────────────────
    const priceGroup = { id:"price", label:"가격 정책", items:[] };

    if (!sell) {
      priceGroup.items.push({ level:"error", msg:"판매가를 입력해 주세요" });
    } else {
      const minP = MIN_PRICE[cur.code] || 1;
      if (sell < minP)
        priceGroup.items.push({ level:"error", msg:`최소 판매가 미달 (${cur.sym}${minP} 이상 필요)` });
      else
        priceGroup.items.push({ level:"pass", msg:`최소가 기준 충족 (${cur.sym}${sell})` });

      // 정가가 있을 때 할인율
      if (F.origLocal && +F.origLocal > 0) {
        const disc = Math.round((1 - sell / +F.origLocal) * 100);
        if (+F.origLocal <= sell)
          priceGroup.items.push({ level:"error", msg:"정가가 판매가보다 낮거나 같아요" });
        else if (disc > 90)
          priceGroup.items.push({ level:"warn", msg:`할인율 ${disc}% — 너무 높으면 신뢰도 저하` });
        else
          priceGroup.items.push({ level:"pass", msg:`할인율 ${disc}% (정상 범위)` });
      }

      // 마진율
      if (cost && sell) {
        const sf=+F.shopFee, pf=+F.payFee, ship=+F.shipLocal||0, etc=+F.etcKRW||0;
        const sellKRW=sell*rate, feeKRW=sellKRW*(sf+pf)/100, shipKRW=ship*rate;
        const margin = ((sellKRW - cost - feeKRW - shipKRW - etc) / sellKRW) * 100;
        if (margin < 0)
          priceGroup.items.push({ level:"error", msg:`적자 판매 중 (마진율 ${margin.toFixed(1)}%)` });
        else if (margin < 10)
          priceGroup.items.push({ level:"warn", msg:`마진율 위험 (${margin.toFixed(1)}% / 권장 10%+)` });
        else if (margin < 20)
          priceGroup.items.push({ level:"warn", msg:`마진율 보통 (${margin.toFixed(1)}% / 권장 20%+)` });
        else
          priceGroup.items.push({ level:"pass", msg:`마진율 양호 (${margin.toFixed(1)}%)` });
      }
    }
    issues.push(priceGroup);

    // ── ④ 카테고리 규정 검사 ──────────────────────────────────
    const catGroup = { id:"cat", label:"카테고리 규정", items:[] };

    // 식품 무게 필수
    if (cat === "식품" && !F.weight)
      catGroup.items.push({ level:"warn", msg:"식품은 무게 입력을 권장해요" });
    else if (F.weight && +F.weight > 0)
      catGroup.items.push({ level:"pass", msg:`무게 ${F.weight}kg 입력됨` });

    // 뷰티 설명 필수
    if (cat === "뷰티/화장품" && desc.length < 80)
      catGroup.items.push({ level:"warn", msg:"뷰티 카테고리는 성분·용량 설명 필수" });

    // 전자기기 무게 권장
    if (cat === "전자기기" && !F.weight)
      catGroup.items.push({ level:"warn", msg:"전자기기는 무게 입력을 권장해요 (배송비 계산)" });

    // 재고
    if (!F.stock || +F.stock < 1)
      catGroup.items.push({ level:"error", msg:"재고 수량을 입력해 주세요" });
    else if (+F.stock < 10)
      catGroup.items.push({ level:"warn", msg:`재고 부족 (${F.stock}개 / 권장 10개+)` });
    else
      catGroup.items.push({ level:"pass", msg:`재고 ${F.stock}개` });

    // 수수료 설정 확인
    if (+F.shopFee === 0)
      catGroup.items.push({ level:"warn", msg:"쇼피 수수료 0% — 정확한지 확인해 주세요" });
    else
      catGroup.items.push({ level:"pass", msg:`수수료 설정 완료 (${F.shopFee}% + ${F.payFee}%)` });

    if (catGroup.items.length === 0)
      catGroup.items.push({ level:"pass", msg:"카테고리 규정 이상 없음" });

    issues.push(catGroup);

    // 전체 점수 계산
    const allItems = issues.flatMap(g => g.items);
    const errors  = allItems.filter(i => i.level === "error").length;
    const warns   = allItems.filter(i => i.level === "warn").length;
    const passes  = allItems.filter(i => i.level === "pass").length;
    const total   = allItems.length;
    const score   = total > 0 ? Math.round((passes / total) * 100) : 0;

    return { groups: issues, errors, warns, passes, score };
  }, [F, cur, rate]);

  function openVision(mode) { setVisionModal(mode); setVisionImg(null); setVisionResult(null); }
  async function handleVisionFile(file) {
    if(!file){ return; }
    if(!file.type.startsWith("image/")){
      toast_("이미지 파일만 가능해요 (JPG, PNG, WEBP)"); return;
    }
    // 10MB 초과 체크
    if(file.size > 10 * 1024 * 1024){
      toast_("이미지 크기가 너무 커요 (최대 10MB)"); return;
    }
    // Anthropic API 지원 형식 체크
    const supported = ["image/jpeg","image/png","image/gif","image/webp"];
    const mediaType = supported.includes(file.type) ? file.type : "image/jpeg";

    try {
      const base64 = await fileToBase64(file);
      setVisionImg({file, base64, url:URL.createObjectURL(file), mediaType});
      setVisionResult(null);
    } catch(e) {
      toast_("이미지를 읽는 데 실패했어요: " + e.message);
    }
  }

  async function analyzeImage() {
    if(!visionImg) return;
    setVisionLoad(true); setVisionResult(null);
    const prompts = {
      competitor:`이 쇼피(Shopee) 상품 스크린샷을 분석해서 아래 정보를 JSON으로 추출해 주세요. JSON 형식으로만 출력:\n{"name":"상품명","price":"판매가(숫자만)","originalPrice":"정가(없으면null)","currency":"MYR/SGD/TWD/THB/PHP/VND/IDR중하나","country":"MY/SG/TW/TH/PH/VN/ID중하나","soldCount":"판매수량(없으면null)","rating":"별점(없으면null)","shop":"셀러명","category":"카테고리","shipping":"배송비","discount":"할인율(없으면null)","features":["특징1","특징2"],"analysis":"경쟁분석요약(2-3문장,한국어)"}`,
      product:`이 상품 이미지를 분석해서 쇼피 판매용 정보를 JSON으로 추출해 주세요. JSON 형식으로만 출력:\n{"name":"상품명(한국어)","nameEn":"상품명(영어)","category":"전자기기/패션/뷰티/생활용품/스포츠/식품/기타중하나","features":["특징1","특징2","특징3"],"desc_ko":"한국어상품설명(이모지포함100자)","desc_en":"영어설명(100자)","keywords":["키워드1","키워드2","키워드3"],"suggestedPrice":"MYR기준예상판매가범위","tips":"판매팁(1-2문장,한국어)"}`,
      receipt:`이 영수증/메모 이미지를 분석해서 비용 정보를 JSON으로 추출해 주세요. JSON 형식으로만 출력:\n{"items":[{"name":"품목명","qty":수량,"unitPrice":단가,"total":합계}],"subtotal":소계,"shipping":배송비,"tax":세금,"total":총합계,"currency":"통화","date":"날짜(없으면null)","vendor":"공급업체명","costPerUnit":"단위당매입가추정(원화숫자,없으면null)","analysis":"비용분석요약(한국어2문장)"}`
    };
    try {
      const res = await fetch(getEdgeFnUrl(),{
        method:"POST", headers:{"Content-Type":"application/json","Authorization":`Bearer ${session?.access_token}`},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:visionImg.mediaType,data:visionImg.base64}},
            {type:"text",text:prompts[visionModal]}
          ]}]
        })
      });

      if (!res.ok) {
        const errData = await res.json().catch(()=>({}));
        const errMsg = errData?.error?.message || `서버 오류 (${res.status})`;
        setVisionResult({error:true, msg: errMsg});
        toast_("분석 실패: " + errMsg);
        return;
      }

      const data = await res.json();

      // API 자체 오류 (ex. 잘못된 이미지 형식, 크레딧 부족 등)
      if (data.error) {
        const errMsg = data.error.message || "API 오류가 발생했어요";
        setVisionResult({error:true, msg: errMsg});
        toast_("분석 실패: " + errMsg);
        return;
      }

      const txt = data.content?.find(b=>b.type==="text")?.text||"";
      if (!txt) {
        setVisionResult({error:true, msg:"AI 응답이 비어 있어요. 다시 시도해 주세요."});
        return;
      }

      // JSON 추출 — 코드블록 안에 있거나 앞뒤 텍스트가 붙어있는 경우 처리
      const jsonMatch = txt.match(/\{[\s\S]*\}/);
      if (!jsonMatch) {
        setVisionResult({error:true, msg:"분석 결과를 읽을 수 없어요. 이미지를 더 선명하게 찍어 주세요.", raw: txt});
        return;
      }

      try {
        const parsed = JSON.parse(jsonMatch[0]);
        setVisionResult(parsed);
        toast_("🔍 분석 완료!");
      } catch(parseErr) {
        setVisionResult({error:true, msg:"결과 형식 오류: " + parseErr.message, raw: txt});
        toast_("결과 파싱 실패");
      }

    } catch(err) {
      const msg = err?.message || "네트워크 오류가 발생했어요";
      toast_("분석 실패: " + msg);
      setVisionResult({error:true, msg});
    }
    finally { setVisionLoad(false); }
  }

              {disc&&<Row k="할인율" v={`${disc}%`} vc={C.amber} bold/>}
              <Row k="원화 환산" v={won(p.sellKRW)}/>
            </div>
            <Sec title="원가 분석 (내부용)" no="③"/>
            <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:18}}>
              <Row k="매입가" v={won(p.costKRW)}/><Row k="수수료" v={won(p.feeKRW)}/>
              <Row k="배송비" v={won(p.shipKRW)}/><Row k="총 원가" v={won(p.totalCost)} bold/>
              <Row k="순이익" v={`${p.profit>=0?"+":""}${won(p.profit)}`} vc={mCol(p.margin)} bold/>
              <Row k="마진율" v={`${ff(p.margin)}%`} vc={mCol(p.margin)} bold/>
            </div>
            {p.desc&&<>
              <Sec title="상품 설명" no="④"/>
              <div style={{position:"relative",marginBottom:18}}>
                <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px 70px 13px 14px",fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap",color:C.txt}}>{p.desc}</div>
                <button onClick={()=>navigator.clipboard.writeText(p.desc).then(()=>toast_("복사!"))}
                  style={{position:"absolute",top:10,right:10,background:C.white,border:`1px solid ${C.border}`,color:C.txtSm,borderRadius:6,padding:"3px 9px",fontSize:10,cursor:"pointer",fontWeight:600}}>복사</button>
              </div>
            </>}
            <Sec title="등록 체크리스트" no={p.desc?"⑤":"④"}/>
            <ul style={{listStyle:"none",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:8}}>
              {checks.map((c,i)=>(
                <li key={c.k} onClick={()=>setChk(x=>({...x,[c.k]:!x[c.k]}))}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",fontSize:12.5,borderBottom:i<checks.length-1?`1px solid ${C.border}`:"none",cursor:"pointer",background:chk[c.k]?C.grnBg:"transparent",color:chk[c.k]?C.grn:C.txtMd,transition:"background .15s"}}>
                  <input type="checkbox" checked={!!chk[c.k]} onChange={()=>{}} style={{width:15,height:15,accentColor:C.grn,flexShrink:0}}/>
                  <span style={{flex:1}}>{c.t}</span>
                  <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:5,background:c.r?C.accLight:"#fef3c7",color:c.r?C.acc:"#b45309"}}>{c.r?"필수":"권장"}</span>
                </li>
              ))}
            </ul>
          </div>
          <div style={{display:"flex",gap:10,padding:"14px 22px 20px",borderTop:`1px solid ${C.border}`,position:"sticky",bottom:0,background:C.white}}>
            <button onClick={()=>copyAll(p)} style={{...btnOr,flex:1}}>📋 전체 복사</button>
            <a href={`${p.cur.searchUrl}${encodeURIComponent(p.name)}`} target="_blank" rel="noreferrer"
              style={{...btnGh,textDecoration:"none",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>🔍 쇼피 검색</a>
            <a href={p.cur.sellerUrl} target="_blank" rel="noreferrer"
              style={{background:C.bg,border:`1px solid ${C.border}`,color:C.txtMd,borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,textDecoration:"none",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>🛒 셀러센터</a>
          </div>
        </div>
      </div>
    );
  };

  // ── Vision 모달 ───────────────────────────────────────────────
  const VINFO = {
    competitor:{icon:"🔍",title:"경쟁사 상품 분석",color:"#6366f1",colorBg:"#eef2ff",tip:"상품명·가격·리뷰수가 보이는 쇼피 화면 캡처를 올려주세요"},
    product:   {icon:"📸",title:"상품 이미지 분석",color:C.grn,   colorBg:C.grnBg,   tip:"판매할 상품 사진을 올리면 AI가 이름·설명·카테고리를 작성해요"},
    receipt:   {icon:"🧾",title:"영수증·원가 분석",color:C.amber,  colorBg:C.amberBg, tip:"금액이 선명하게 보이는 영수증이나 원가 메모 사진을 올려주세요"},
  };

  const VisionModal = () => {
    const info = VINFO[visionModal];
    if(!info) return null;
    return (
      <div onClick={e=>e.target===e.currentTarget&&setVisionModal(null)}
        style={{position:"fixed",inset:0,background:"rgba(26,15,10,.45)",backdropFilter:"blur(10px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:20,width:"100%",maxWidth:540,maxHeight:"92vh",overflowY:"auto",boxShadow:`0 24px 60px rgba(238,77,45,.12)`}}>
          {/* 헤더 */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 22px 14px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:40,height:40,borderRadius:12,background:info.colorBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,border:`1px solid ${C.border}`}}>{info.icon}</div>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:C.txt}}>{info.title}</div>
                <div style={{fontSize:11,color:C.txtSm,marginTop:1}}>AI 이미지 분석</div>
              </div>
            </div>
            <button onClick={()=>setVisionModal(null)} style={{background:C.bg,border:`1px solid ${C.border}`,color:C.txtSm,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>

          <div style={{padding:"16px 22px"}}>
            {/* 안내 */}
            <div style={{background:info.colorBg,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 14px",marginBottom:16,fontSize:12,color:C.txtMd,display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{fontSize:15,flexShrink:0}}>💡</span><span>{info.tip}</span>
            </div>

            {/* 업로드 영역 */}
            {!visionImg ? (
              <div ref={dropRef} onClick={()=>visionInputRef.current?.click()}
                onDragOver={e=>{e.preventDefault(); dropRef.current.style.borderColor=info.color;}}
                onDragLeave={()=>{ if(dropRef.current) dropRef.current.style.borderColor=C.borderMd; }}
                onDrop={e=>{ e.preventDefault(); if(dropRef.current) dropRef.current.style.borderColor=C.borderMd; const f=e.dataTransfer.files[0]; if(f) handleVisionFile(f); }}
                style={{border:`2px dashed ${C.borderMd}`,borderRadius:14,padding:"40px 20px",textAlign:"center",cursor:"pointer",transition:"border-color .2s",marginBottom:16,background:C.bg}}>
                <div style={{fontSize:38,marginBottom:10}}>📁</div>
                <div style={{fontSize:14,fontWeight:700,color:C.txt,marginBottom:6}}>클릭하거나 드래그해서 이미지 업로드</div>
                <div style={{fontSize:11,color:C.txtSm,marginBottom:14}}>JPG, PNG, WEBP · 최대 10MB</div>
                <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:7,padding:"5px 12px",fontSize:11,color:C.txtSm,fontWeight:600}}>📂 파일 선택</span>
                  <span style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:7,padding:"5px 12px",fontSize:11,color:C.txtSm,fontWeight:600}}>📋 Ctrl+V 붙여넣기</span>
                </div>
              </div>
            ) : (
              <div style={{marginBottom:16}}>
                <div style={{position:"relative",borderRadius:12,overflow:"hidden",marginBottom:8,maxHeight:240,display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,border:`1px solid ${C.border}`}}>
                  <img src={visionImg.url} alt="분석 대상" style={{maxWidth:"100%",maxHeight:240,objectFit:"contain",display:"block"}}/>
                  <button onClick={()=>{setVisionImg(null);setVisionResult(null);}}
                    style={{position:"absolute",top:8,right:8,background:"rgba(255,255,255,.9)",border:`1px solid ${C.border}`,color:C.txtMd,borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>✕</button>
                </div>
                <div style={{fontSize:11,color:C.txtSm,textAlign:"center"}}>{visionImg.file.name} · {(visionImg.file.size/1024).toFixed(0)}KB</div>
              </div>
            )}
            <input ref={visionInputRef} type="file" accept="image/*" style={{display:"none"}}
              onChange={e=>{if(e.target.files[0]) handleVisionFile(e.target.files[0]);}}/>

            {/* 결과 */}
            {visionResult && !visionResult.error && (
              <div style={{marginBottom:4}}>
                <div style={{fontSize:11,fontWeight:700,color:C.grn,letterSpacing:".06em",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:18,height:18,borderRadius:50,background:C.grnBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>✓</span> 분석 완료
                </div>
                <div style={{border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
                  {/* 경쟁사 */}
                  {visionModal==="competitor" && [
                    ["상품명",visionResult.name],
                    ["판매가",visionResult.price?`${visionResult.currency||""} ${visionResult.price}`:null],
                    ["정가",visionResult.originalPrice?`${visionResult.currency||""} ${visionResult.originalPrice}`:null],
                    ["할인율",visionResult.discount?`${visionResult.discount}%`:null],
                    ["판매수량",visionResult.soldCount],["별점",visionResult.rating],
                    ["배송비",visionResult.shipping],["국가",visionResult.country],
                  ].filter(([,v])=>v).map(([k,v])=>(
                    <div key={k} style={{display:"grid",gridTemplateColumns:"88px 1fr",borderBottom:`1px solid ${C.border}`}}>
                      <div style={{padding:"8px 11px",fontSize:11,color:C.txtSm,background:C.bg,fontWeight:600}}>{k}</div>
                      <div style={{padding:"8px 11px",fontSize:12,color:C.txt,fontWeight:600}}>{v}</div>
                    </div>
                  ))}
                  {/* 상품 이미지 */}
                  {visionModal==="product" && <>
                    {[["상품명(한)",visionResult.name],["상품명(영)",visionResult.nameEn],["카테고리",visionResult.category],["예상 판매가",visionResult.suggestedPrice?`MYR ${visionResult.suggestedPrice}`:null]]
                      .filter(([,v])=>v).map(([k,v])=>(
                        <div key={k} style={{display:"grid",gridTemplateColumns:"88px 1fr",borderBottom:`1px solid ${C.border}`}}>
                          <div style={{padding:"8px 11px",fontSize:11,color:C.txtSm,background:C.bg,fontWeight:600}}>{k}</div>
                          <div style={{padding:"8px 11px",fontSize:12,color:C.txt,fontWeight:600}}>{v}</div>
                        </div>
                      ))}
                    {visionResult.features?.length>0&&(
                      <div style={{padding:"10px 13px",borderBottom:`1px solid ${C.border}`}}>
                        <div style={{fontSize:10,color:C.txtSm,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>주요 특징</div>
                        {visionResult.features.map((f,i)=><div key={i} style={{fontSize:12,color:C.txtMd,marginBottom:4,display:"flex",gap:6}}><span style={{color:C.acc}}>•</span>{f}</div>)}
                      </div>
                    )}
                    {visionResult.desc_ko&&(
                      <div style={{padding:"10px 13px",borderBottom:`1px solid ${C.border}`}}>
                        <div style={{fontSize:10,color:C.txtSm,marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>AI 상품 설명</div>
                        <div style={{fontSize:12,color:C.txtMd,lineHeight:1.75}}>{visionResult.desc_ko}</div>
                      </div>
                    )}
                    {visionResult.tips&&<div style={{padding:"10px 13px",fontSize:12,color:C.txtMd,lineHeight:1.65,background:C.grnBg}}>💡 {visionResult.tips}</div>}
                  </>}
                  {/* 영수증 */}
                  {visionModal==="receipt" && <>
                    {visionResult.vendor&&<div style={{padding:"9px 13px",borderBottom:`1px solid ${C.border}`,fontSize:12,color:C.txt,fontWeight:700}}>🏪 {visionResult.vendor}{visionResult.date?` · ${visionResult.date}`:""}</div>}
                    {visionResult.items?.map((item,i)=>(
                      <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,padding:"8px 13px",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                        <div style={{color:C.txtMd}}>{item.name} <span style={{color:C.txtSm}}>×{item.qty}</span></div>
                        <div style={{color:C.txtSm,fontSize:11}}>@{item.unitPrice?.toLocaleString()}</div>
                        <div style={{color:C.amber,fontWeight:700}}>{item.total?.toLocaleString()}</div>
                      </div>
                    ))}
                    {[["소계",visionResult.subtotal],["배송비",visionResult.shipping],["세금",visionResult.tax]].filter(([,v])=>v).map(([k,v])=>(
                      <div key={k} style={{display:"grid",gridTemplateColumns:"1fr auto",padding:"7px 13px",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                        <span style={{color:C.txtSm}}>{k}</span><span style={{color:C.txtMd}}>{typeof v==="number"?v.toLocaleString():v}</span>
                      </div>
                    ))}
                    <div style={{display:"grid",gridTemplateColumns:"1fr auto",padding:"10px 13px",borderBottom:`1px solid ${C.border}`,fontSize:13,fontWeight:700}}>
                      <span style={{color:C.txt}}>합계 ({visionResult.currency})</span>
                      <span style={{color:C.amber}}>{visionResult.total?.toLocaleString()}</span>
                    </div>
                    {visionResult.costPerUnit&&(
                      <div style={{padding:"9px 13px",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                        <span style={{color:C.txtSm}}>단위당 매입가 추정 </span>
                        <span style={{color:C.acc,fontWeight:700}}>{Number(visionResult.costPerUnit).toLocaleString()}원</span>
                      </div>
                    )}
                    {visionResult.analysis&&<div style={{padding:"10px 13px",fontSize:12,color:C.txtMd,lineHeight:1.65,background:C.amberBg}}>💬 {visionResult.analysis}</div>}
                  </>}
                  {/* 경쟁사 분석 텍스트 */}
                  {visionModal==="competitor"&&visionResult.analysis&&(
                    <div style={{padding:"10px 13px",fontSize:12,color:C.txtMd,lineHeight:1.65,background:"#eef2ff"}}>💬 {visionResult.analysis}</div>
                  )}
                </div>
              </div>
            )}
            {visionResult?.error&&(
              <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:10,padding:"12px 14px",fontSize:13,color:"#b91c1c",marginBottom:4}}>
                <div style={{fontWeight:700,marginBottom:4}}>⚠️ 분석 실패</div>
                <div>{visionResult.msg || "분석에 실패했어요. 더 선명한 이미지로 다시 시도해 주세요."}</div>
                {visionResult.raw && (
                  <details style={{marginTop:8}}>
                    <summary style={{fontSize:11,cursor:"pointer",opacity:.7}}>AI 원본 응답 보기</summary>
                    <div style={{marginTop:6,fontSize:11,fontFamily:"monospace",background:"rgba(0,0,0,.05)",padding:"6px 8px",borderRadius:6,whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:120,overflowY:"auto"}}>{visionResult.raw}</div>
                  </details>
                )}
              </div>
            )}
          </div>

          {/* 하단 버튼 */}
          <div style={{padding:"12px 22px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10,position:"sticky",bottom:0,background:C.white}}>
            {!visionImg ? (
              <button onClick={()=>visionInputRef.current?.click()} style={{...btnGh,flex:1}}>📂 이미지 선택</button>
            ) : !visionResult ? (
              <button onClick={analyzeImage} disabled={visionLoad}
                style={{...btnOr,flex:1,opacity:visionLoad?.6:1,cursor:visionLoad?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                {visionLoad?<><span style={{display:"inline-block",animation:"spin .7s linear infinite"}}>⟳</span> AI 분석 중...</>:`${info.icon} AI 분석 시작`}
              </button>
            ) : !visionResult.error && (
              <>
                <button onClick={()=>{setVisionImg(null);setVisionResult(null);}} style={{...btnGh}}>다시</button>
                <button onClick={applyVisionResult} style={{...btnOr,flex:1}}>✅ 폼에 적용하기</button>
              </>
            )}
          </div>
        </div>
      </div>
    );
  };

  // ── 렌더 ──────────────────────────────────────────────────────
  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.txt,fontFamily:"'DM Sans','Noto Sans KR',sans-serif"}}>

      {/* 헤더 */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,boxShadow:`0 1px 8px ${C.shadow}`,padding:"0 20px"}}>
        <div style={{maxWidth:640,margin:"0 auto",display:"flex",alignItems:"center",height:56,gap:12}}>
          <div style={{background:C.acc,borderRadius:8,padding:"5px 11px",display:"flex",alignItems:"center",gap:6,boxShadow:`0 2px 8px ${C.shadowMd}`}}>
            <span style={{color:"#fff",fontSize:12,fontWeight:800,letterSpacing:".06em"}}>SHOPEE</span>
          </div>
          <div>
            <span style={{fontWeight:800,fontSize:16,color:C.txt}}>셀러 마진 계산기</span>
            <span style={{fontSize:11,color:C.txtSm,marginLeft:8,fontWeight:500}}>Seller Profit Calculator</span>
          </div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
            <div style={{background:C.accLight,border:`1px solid #fcd5c8`,borderRadius:8,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:6,height:6,background:C.grn,borderRadius:"50%",flexShrink:0,boxShadow:`0 0 0 2px ${C.grnBg}`}}></span>
              <span style={{color:C.acc,fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>
                1 {cur.code} = {rate>=1?Math.round(rate).toLocaleString():rate.toFixed(4)} KRW
              </span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {/* Supabase 연결 상태 버튼 */}
              <button onClick={()=>{setSbUrlInp(getSbUrl());setSbAnonInp(getSbAnon());setSbModal(true);}}
                style={{background:sbConfigOk?C.grnBg:"#fee2e2",border:`1px solid ${sbConfigOk?"#86efac":"#fca5a5"}`,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700,color:sbConfigOk?C.grn:"#dc2626",whiteSpace:"nowrap"}}>
                {sbConfigOk?"🔗 Supabase 연결됨":"⚠️ Supabase 미설정"}
              </button>
              {session && (
                <>
                  <div style={{background:C.grnBg,border:"1px solid #86efac",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:600,color:C.grn,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    👤 {session.user.email}
                  </div>
                  <button onClick={handleLogout}
                    style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700,color:C.txtMd,whiteSpace:"nowrap"}}>
                    로그아웃
                  </button>
                </>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* 탭 */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`}}>
        <div style={{maxWidth:640,margin:"0 auto",display:"flex"}}>
          {[{k:"form",icon:"📝",label:"상품 입력"},{k:"list",icon:"📦",label:`목록 (${items.length})`}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              style={{flex:1,padding:"13px 8px",fontSize:13,fontWeight:700,fontFamily:"inherit",border:"none",
                borderBottom:tab===t.k?`2.5px solid ${C.acc}`:"2.5px solid transparent",
                background:"transparent",color:tab===t.k?C.acc:C.txtSm,cursor:"pointer",transition:"all .15s"}}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* ══ 입력 탭 ══ */}
      {tab==="form" && (
        <div style={{padding:"20px 16px",maxWidth:1080,margin:"0 auto",display:"grid",gridTemplateColumns:"minmax(0,520px) minmax(0,340px)",gap:20,alignItems:"start"}} className="form-grid">
        {/* ── 왼쪽: 입력 영역 ── */}
        <div>

          {/* AI 이미지 분석 카드 */}
          <div style={{...card,marginBottom:20,padding:16}}>
            <div style={{fontSize:11,fontWeight:700,color:C.txtSm,letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>📷 AI 이미지 분석으로 자동 입력</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {[
                {mode:"competitor",icon:"🔍",label:"경쟁사\n스크린샷",sub:"가격 자동 추출",color:"#6366f1",bg:"#eef2ff",border:"#c7d2fe"},
                {mode:"product",   icon:"📸",label:"상품\n사진",      sub:"설명 자동 생성",color:C.grn,   bg:C.grnBg,  border:"#86efac"},
                {mode:"receipt",   icon:"🧾",label:"영수증\n원가",    sub:"비용 자동 입력",color:C.amber, bg:C.amberBg,border:"#fcd34d"},

                    <div style={{padding:"12px 16px 10px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}>
                        <span style={{color:C.txtSm,fontWeight:600}}>마진율</span>
                        <span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:mCol(p.margin)}}>{ff(p.margin)}%</span>
                      </div>
                      <div style={{height:6,background:C.bgAlt,borderRadius:4,overflow:"hidden",border:`1px solid ${C.border}`}}>
                        <div style={{height:"100%",width:`${barW}%`,background:`linear-gradient(90deg,${mCol(p.margin)},${mCol(p.margin)}cc)`,borderRadius:4,transition:"width .5s"}}></div>
                      </div>
                    </div>

                    <div style={{display:"flex",gap:10,padding:"10px 16px 14px",borderTop:`1px solid ${C.border}`}}>
                      <a href={`${p.cur.searchUrl}${encodeURIComponent(p.name)}`} target="_blank" rel="noreferrer"
                        style={{...btnGh,flex:1,textAlign:"center",textDecoration:"none",display:"block",padding:"9px 8px"}}>
                        🔍 쇼피 검색
                      </a>
                      <button onClick={()=>setSheet(p)} style={{...btnOr,flex:1,padding:"9px 8px",borderRadius:10}}>
                        📋 등록 시트
                      </button>
                    </div>
                  </div>
                );
              })}

              <button onClick={()=>setTab("form")}
                style={{width:"100%",background:C.white,border:`1.5px dashed ${C.borderMd}`,color:C.txtSm,borderRadius:12,padding:"13px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600,marginTop:4}}>
                + 상품 더 추가하기
              </button>
            </>
          )}
        </div>
      )}

      {/* ── Supabase 설정 모달 ── */}
      {sbModal && (
        <div onClick={e=>{ if(e.target===e.currentTarget && sbConfigOk) setSbModal(false); }}
          style={{position:"fixed",inset:0,background:"rgba(26,15,10,.55)",backdropFilter:"blur(10px)",zIndex:1200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:20,width:"100%",maxWidth:460,boxShadow:`0 24px 60px rgba(238,77,45,.12)`}}>

            {/* 헤더 */}
            <div style={{padding:"20px 22px 16px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:12,background:C.accLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🔗</div>
                <div>
                  <div style={{fontSize:15,fontWeight:800,color:C.txt}}>Supabase 연결 설정</div>
                  <div style={{fontSize:11,color:C.txtSm,marginTop:1}}>프로젝트 URL과 Anon Key를 입력해 주세요</div>
                </div>
                {sbConfigOk && <button onClick={()=>setSbModal(false)} style={{marginLeft:"auto",background:C.bg,border:`1px solid ${C.border}`,color:C.txtSm,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
              </div>
            </div>

            <div style={{padding:"18px 22px 22px"}}>
              {/* 안내 */}
              <div style={{background:C.accLight,border:`1px solid #fcd5c8`,borderRadius:10,padding:"11px 14px",marginBottom:16,fontSize:12,color:C.txtMd,lineHeight:1.7}}>
                <div style={{fontWeight:700,marginBottom:4}}>📌 값 확인 방법</div>
                <div>1. <a href="https://supabase.com/dashboard" target="_blank" rel="noreferrer" style={{color:C.acc,fontWeight:600}}>supabase.com/dashboard</a> 접속</div>
                <div>2. 프로젝트 선택 → <strong style={{fontWeight:600}}>Settings → API</strong></div>
                <div>3. Project URL + anon public key 복사</div>
              </div>

              {/* Project URL */}
              <div style={{marginBottom:12}}>
                <label style={{...lbl,marginBottom:5}}>Project URL</label>
                <input style={{...inp,fontFamily:"'DM Mono',monospace",fontSize:12}}
                  placeholder="https://xxxxxxxxxxxxxxxx.supabase.co"
                  value={sbUrlInp}
                  onChange={e=>setSbUrlInp(e.target.value)}
                  onFocus={e=>e.target.style.borderColor=C.acc}
                  onBlur={e=>e.target.style.borderColor=C.border}
                />
              </div>

              {/* Anon Key */}
              <div style={{marginBottom:18}}>
                <label style={{...lbl,marginBottom:5}}>Anon public key</label>
                <textarea style={{...inp,minHeight:72,resize:"vertical",fontFamily:"'DM Mono',monospace",fontSize:11,lineHeight:1.5}}
                  placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  value={sbAnonInp}
                  onChange={e=>setSbAnonInp(e.target.value)}
                  onFocus={e=>e.target.style.borderColor=C.acc}
                  onBlur={e=>e.target.style.borderColor=C.border}
                />
              </div>

              {/* 현재 상태 */}
              {sbConfigOk && (
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"8px 12px",background:C.grnBg,borderRadius:8,border:"1px solid #86efac"}}>
                  <span style={{fontSize:13}}>✅</span>
                  <span style={{fontSize:11,color:C.grn,fontWeight:600,flex:1}}>연결 설정됨: {getSbUrl().replace('https://','').split('.')[0]}...</span>
                  <button onClick={handleClearSbConfig}
                    style={{background:"none",border:"1px solid #86efac",color:C.grn,borderRadius:5,padding:"2px 8px",fontSize:10,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>
                    초기화
                  </button>
                </div>
              )}

              <div style={{display:"flex",gap:10}}>
                {sbConfigOk && (
                  <button onClick={()=>setSbModal(false)} style={{...btnGh,flex:1}}>취소</button>
                )}
                <button onClick={handleSaveSbConfig} style={{...btnOr,flex:2,padding:"12px"}}>
                  🔗 저장하고 연결하기
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── 로그인 화면 (미인증 시 전체 오버레이) ── */}
      {authReady && !session && sbConfigOk && (
        <div style={{position:"fixed",inset:0,background:C.bg,zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:24,width:"100%",maxWidth:400,boxShadow:`0 24px 60px rgba(238,77,45,.12)`}}>

            {/* 로고 */}
            <div style={{padding:"28px 24px 20px",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>
              <div style={{background:C.acc,borderRadius:12,padding:"8px 16px",display:"inline-flex",alignItems:"center",marginBottom:14,boxShadow:`0 4px 14px rgba(238,77,45,.3)`}}>
                <span style={{color:"#fff",fontSize:14,fontWeight:800,letterSpacing:".06em"}}>SHOPEE</span>
              </div>
              <div style={{fontSize:18,fontWeight:800,color:C.txt,marginBottom:4}}>셀러 마진 계산기</div>
              <div style={{fontSize:12,color:C.txtSm}}>
                {authMode==="login"?"계정으로 로그인하세요":authMode==="signup"?"새 계정 만들기":"비밀번호 재설정"}
              </div>
            </div>

            <div style={{padding:"20px 24px 24px"}}>
              {/* 에러 / 메시지 */}
              {authErr && (
                <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:9,padding:"10px 13px",fontSize:12,color:"#b91c1c",marginBottom:14,fontWeight:500}}>
                  ⚠️ {authErr}
                </div>
              )}
              {authMsg && (
                <div style={{background:C.grnBg,border:"1px solid #86efac",borderRadius:9,padding:"10px 13px",fontSize:12,color:C.grn,marginBottom:14,fontWeight:500}}>
                  {authMsg}
                </div>
              )}

              {/* 이메일 입력 */}
              <div style={{marginBottom:12}}>
                <label style={lbl}>이메일</label>
                <input style={inp} type="email" placeholder="example@email.com"
                  value={authEmail} onChange={e=>{setAuthEmail(e.target.value);setAuthErr('');}}
                  onKeyDown={e=>{ if(e.key==='Enter') authMode==='login'?handleLogin():authMode==='signup'?handleSignup():handleReset(); }}
                  onFocus={e=>e.target.style.borderColor=C.acc}
                  onBlur={e=>e.target.style.borderColor=C.border}
                  autoFocus/>
              </div>

              {/* 비밀번호 입력 (reset 모드 제외) */}
              {authMode !== 'reset' && (
                <div style={{marginBottom:16}}>
                  <label style={lbl}>비밀번호{authMode==='signup'?' (6자 이상)':''}</label>
                  <div style={{position:"relative"}}>
                    <input
                      style={{...inp,paddingRight:44}}
                      type={authPwShow?"text":"password"}
                      placeholder="••••••••"
                      value={authPw}
                      onChange={e=>{setAuthPw(e.target.value);setAuthErr('');}}
                      onKeyDown={e=>{ if(e.key==='Enter') authMode==='login'?handleLogin():handleSignup(); }}
                      onFocus={e=>e.target.style.borderColor=C.acc}
                      onBlur={e=>e.target.style.borderColor=C.border}
                    />
                    <button onClick={()=>setAuthPwShow(v=>!v)}
                      style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:15,color:C.txtSm,padding:"2px"}}>
                      {authPwShow?"🙈":"👁️"}
                    </button>
                  </div>
                </div>
              )}

              {/* 메인 버튼 */}
              <button
                onClick={authMode==='login'?handleLogin:authMode==='signup'?handleSignup:handleReset}
                disabled={authLoad}
                style={{...btnOr,width:"100%",padding:"13px",fontSize:14,borderRadius:12,opacity:authLoad?.6:1,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                {authLoad
                  ? <><span style={{display:"inline-block",animation:"spin .7s linear infinite"}}>⟳</span> 처리 중...</>
                  : authMode==='login' ? '로그인'
                  : authMode==='signup' ? '회원가입'
                  : '재설정 링크 보내기'}
              </button>

              {/* Google 로그인 */}
              {authMode !== 'reset' && (
                <button onClick={handleGoogleLogin}
                  style={{width:"100%",background:C.white,border:`1.5px solid ${C.border}`,borderRadius:12,padding:"11px",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8,color:C.txtMd}}>
                  <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                  Google로 로그인
                </button>
              )}

              {/* 모드 전환 링크 */}
              <div style={{textAlign:"center",fontSize:12,color:C.txtSm}}>
                {authMode==='login' && <>
                  계정이 없으신가요?{' '}
                  <span onClick={()=>{setAuthMode('signup');setAuthErr('');setAuthMsg('');}} style={{color:C.acc,fontWeight:700,cursor:"pointer"}}>회원가입</span>
                  {'  ·  '}
                  <span onClick={()=>{setAuthMode('reset');setAuthErr('');setAuthMsg('');}} style={{color:C.txtSm,fontWeight:600,cursor:"pointer"}}>비밀번호 찾기</span>
                </>}
                {authMode==='signup' && <>
                  이미 계정이 있으신가요?{' '}
                  <span onClick={()=>{setAuthMode('login');setAuthErr('');setAuthMsg('');}} style={{color:C.acc,fontWeight:700,cursor:"pointer"}}>로그인</span>
                </>}
                {authMode==='reset' && <>
                  <span onClick={()=>{setAuthMode('login');setAuthErr('');setAuthMsg('');}} style={{color:C.acc,fontWeight:700,cursor:"pointer"}}>← 로그인으로 돌아가기</span>
                </>}
              </div>
            </div>
          </div>
        </div>
      )}

      {sheet && <Sheet p={sheet}/>}
      {visionModal && <VisionModal/>}

      {toast && (
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:C.txt,color:"#fff",padding:"10px 24px",borderRadius:30,fontSize:13,fontWeight:700,zIndex:9999,pointerEvents:"none",whiteSpace:"nowrap",boxShadow:"0 6px 24px rgba(26,15,10,.25)"}}>
          {toast}
        </div>
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        input[type=range] { height: 4px; cursor: pointer; }
        select option { background: #fff; color: #1A0F0A; }
        @keyframes spin { to { transform: rotate(360deg); } }
        button:hover { opacity: 0.88; }
        a:hover { opacity: 0.88; }
      `}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
